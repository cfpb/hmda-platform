include "serialization.conf"

akka.license-key = ""
akka.license-key = ${?AKKA_LICENSE_KEY}

akka.persistence.r2dbc.migration {

  # Akka Persistence plugin to migrate from.
  # You must also define plugin specific configuration
  # and application specific serializers for events and snapshots.
  source {
    query-plugin-id = "akka.persistence.cassandra.query"
    snapshot-plugin-id = "akka.persistence.cassandra.snapshot"
  }

  # R2DBC Akka Persistence plugin to migrate to.
  # You must also define akka-persistence-r2dbc specific configuration.
  target {
    # this must be a configuration path of akka-persistence-r2dbc
    persistence-plugin-id = "akka.persistence.r2dbc"

    # Events are stored in batches of this size.
    batch = 100
    batch = ${?AKKA_PERSISTENCE_MIGRATE_BATCH}
  }

  # How many persistence ids to migrate concurrently.
  parallelism = 20
  parallelism = ${?AKKA_PERSISTENCE_MIGRATE_PARALLELISM}

}

akka.persistence.r2dbc {
  # use different table names or schema
  log-db-calls-exceeding = -1
  schema = ""
  schema = ${?AKKA_PERSISTENCE_PG_SCHEMA}
  journal.table = "event_journal"
  journal.table = ${?AKKA_PERSISTENCE_PG_JOURNAL_TABLE}
  snapshot.table = "snapshot"
  snapshot.table = ${?AKKA_PERSISTENCE_PG_SNAP_TABLE}
  state.table = "durable_state"
  state.table = ${?AKKA_PERSISTENCE_PG_DURABLE_STATE_TABLE}
}

akka.persistence.r2dbc.connection-factory = ${akka.persistence.r2dbc.postgres}
akka.persistence.r2dbc.connection-factory {
  driver = "postgres"
  host = "localhost"
  host = ${?AKKA_PERSISTENCE_PG_HOST}
  port = 5432
  user = "postgres"
  user = ${?AKKA_PERSISTENCE_PG_USER}
  password = "postgres"
  password = ${?AKKA_PERSISTENCE_PG_PASSWORD}
  database = "postgres"
  database = ${?AKKA_PERSISTENCE_PG_DB}

  ssl {
    enabled = off
    enabled = ${?AKKA_PERSISTENCE_PG_SSL_ENABLED}
    mode = ""
    mode = ${?AKKA_PERSISTENCE_PG_SSL_MODE}
    root-cert = ""
    cert = ""
    key = ""
    password = ""
  }
}

akka {
  persistence {
    journal.plugin = "akka.persistence.cassandra.journal"
    snapshot-store.plugin = "akka.persistence.cassandra.snapshot"

    query {
      journal.id = "akka.persistence.cassandra.query"
    }

    cassandra {
      events-by-tag {
        max-message-batch-size = 30
        max-message-batch-size = ${?TAG_BATCH_SIZE}
        flush-interval = 150ms
        flush-interval = ${?TAG_FLUSH_INTERVAL}
        # read-profile = "akka-persistence-cassandra-profile-keyspaces"
        # write-profile = "akka-persistence-cassandra-profile-keyspaces"
        read-profile1 = ${?CASSANDRA_PROFILE}
        write-profile = ${?CASSANDRA_PROFILE}
      }
      journal {
        keyspace = "hmda2_journal"
        keyspace = ${?CASSANDRA_JOURNAL_KEYSPACE}
        table = "journal"
        table = ${?CASSANDRA_JOURNAL_TABLE}
        events-by-tag.max-message-batch-size = 30
        events-by-tag.max-message-batch-size = ${?TAG_BATCH_SIZE}
        events-by-tag.flush-interval = 150ms
        events-by-tag.flush-interval = ${?TAG_FLUSH_INTERVAL}
        target-partition-size = 500000
        target-partition-size = ${?CASSANDRA_TARGET_PARTITION_SIZE}
      }
      query {
        # reference: https://github.com/akka/akka-persistence-cassandra/blob/v0.101/core/src/main/resources/reference.conf
        # Sequence numbers for a persistenceId is assumed to be monotonically increasing
        # without gaps. That is used for detecting missing events.
        # In early versions of the journal that might not be true and therefore
        # this can be relaxed by setting this property to off.
        gap-free-sequence-numbers = off
      }
      snapshot {
        keyspace = "hmda2_snapshot"
        keyspace = ${?CASSANDRA_SNAPSHOT_KEYSPACE}
        table = "snapshot"
        table = ${?CASSANDRA_SNAPSHOT_TABLE}
      }
    }
  }


}

datastax-java-driver {

  profiles {
    akka-persistence-cassandra-profile {
      basic {
        request.consistency = LOCAL_QUORUM
      }
    }
  }

  basic {
      contact-points = ["localhost:9042"]
      contact-points = [${?CASSANDRA_CLUSTER_HOSTS}]
      load-balancing-policy.local-datacenter = "main"
      load-balancing-policy.local-datacenter = ${?CASSANDRA_CLUSTER_DC}
      load-balancing-policy.slow-replica-avoidance = false
  }

  advanced {
    advanced.protocol {
      version = V4
    }
    advanced.reconnect-on-init = true
    auth-provider {
      class = PlainTextAuthProvider
      username = ""
      username = ${?CASSANDRA_CLUSTER_USERNAME}
      password = ""
      password = ${?CASSANDRA_CLUSTER_PASSWORD}
    }
    request-tracker {
      classes = [RequestLogger]
      logs {
        slow {
          threshold = 1 second
          enabled = true
        }
      }
    }
  }
}

akka.persistence.r2dbc.state.assert-single-writer = off



dbconfig {
  host = "localhost"
  host = ${?AKKA_PERSISTENCE_PG_HOST}
  port = 5432
  database = "postgres"
  database = ${?AKKA_PERSISTENCE_PG_DB}
  user = "postgres"
  user = ${?AKKA_PERSISTENCE_PG_USER}
  password = "postgres"
  password = ${?AKKA_PERSISTENCE_PG_PASSWORD}
  ssl = "disable"
  ssl = ${?AKKA_PERSISTENCE_PG_SSL_MODE}
  additionalConfig="ssl=disable&sslfactory=org.postgresql.ssl.NonValidatingFactory"
}

slickdb {
  profile = "slick.jdbc.PostgresProfile$"

  db {
    profile = slick.jdbc.PostgresProfile
    url = "jdbc:postgresql://"${dbconfig.host}":"${dbconfig.port}"/"${dbconfig.database}"?user="${dbconfig.user}"&password="${dbconfig.password}"&sslmode="${dbconfig.ssl}"&"${dbconfig.additionalConfig}
    url = ${?JDBC_URL}
    numThreads = 4
    queueSize = 100
    connectionTimeout = 20000
    validationTimeout = 10000
  }
}