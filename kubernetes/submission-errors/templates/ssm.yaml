apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.hmda.ssm.name }}
spec:
  provider: aws
  parameters:
    usePodIdentity: {{ .Values.hmda.ssm.usePodIdentity | quote }}
    {{- with .Values.hmda.ssm.objects }}
    objects: |
{{ toYaml . | indent 6 }}
    {{- end }}
  {{- with .Values.hmda.ssm.secretObjects }}
  secretObjects:
{{ toYaml . | indent 4 }}
  {{- end }}