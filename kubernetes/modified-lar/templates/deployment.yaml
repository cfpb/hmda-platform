apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "modified-lar.fullname" . }}
  annotations:
    downscaler/uptime: Mon-Fri 10:00-23:00 UTC
    reloader.stakater.com/search: "true"
  labels:
    app: {{ include "modified-lar.name" . }}
    chart: {{ include "modified-lar.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "modified-lar.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "modified-lar.name" . }}
        release: {{ .Release.Name }}
    spec:
      serviceAccountName: hmda-platform-irsa
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      volumes:
        - name: rds-secret-provider-vol
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: irsa-hmda-rds-secrets-provider
        - name: actor-persistence-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: irsa-actor-persistence-secrets-provider
        - name: tz-config
          hostPath:
            path: /usr/share/zoneinfo/America/New_York
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          volumeMounts:
            - name: rds-secret-provider-vol
              mountPath: /mnt/rds-secrets-store
            - name: actor-persistence-secrets
              mountPath: /mnt/actor-persistence-secrets
              readOnly: true
            - name: tz-config
              mountPath: /etc/localtime
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL             
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
#          resources:
#            limits:
#              cpu: "4"
#              memory: "2200Mi"
          env:
            - name: _JAVA_OPTIONS
              value: >
                -Dhttps.protocols=SSLv3,TLSv1,TLSv1.1,TLSv1.2
                -Dcom.sun.security.enableAIAcaIssuers=true
            - name: ACTOR_PERSISTENCE_PG_HOST
              valueFrom:
                secretKeyRef:
                  name: irsa-actor-persistence-secrets
                  key: host
            - name: ACTOR_PERSISTENCE_PG_SCHEMA
              value: actor_persistence_beta
            - name: ACTOR_PERSISTENCE_PG_DB
              valueFrom:
                secretKeyRef:
                  name: irsa-actor-persistence-secrets
                  key: database
            - name: ACTOR_PERSISTENCE_PG_USER
              valueFrom:
                secretKeyRef:
                  name: irsa-actor-persistence-secrets
                  key: username
            - name: ACTOR_PERSISTENCE_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: irsa-actor-persistence-secrets
                  key: password
            - name: ACTOR_PERSISTENCE_PG_SSL_ENABLED
              value: "on"
            - name: ACTOR_PERSISTENCE_PG_SSL_MODE
              value: allow
            - name: ACTOR_PERSISTENCE_PG_BUFFER_SIZE
              value: "2000"
            - name: ACTOR_PERSISTENCE_PG_REFRESH_INTERVAL
              value: "1s"
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: irsa-platform-rds-secrets
                  key: host
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: irsa-platform-rds-secrets
                  key: database
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: irsa-platform-rds-secrets
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: irsa-platform-rds-secrets
                  key: password
            - name: KAFKA_CLUSTER_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: kafka-configmap
                  key: kafka.hosts
            - name: AWS_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: s3-configmap
                  key: aws-environment
            - name: S3_PUBLIC_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: s3-configmap
                  key: s3-public-bucket
            - name: BANK_FILTER_LIST
              valueFrom:
                configMapKeyRef:
                  name: bank-filter-configmap
                  key: bank-filter-list
            - name: HTTP_CENSUS_HOST
              valueFrom:
                configMapKeyRef:
                  name: http-configmap
                  key: census.host
            - name: HTTP_CENSUS_PORT
              valueFrom:
                configMapKeyRef:
                  name: http-configmap
                  key: census.port
            - name: KAFKA_LOG_LEVEL
              value: INFO
            - name: KAFKA_MODIFIED_LAR_TOPIC
              value: {{.Values.kafka.modifiedLarTopic}}
            - name: KAFKA_SIGN_TOPIC
              value: {{.Values.kafka.signTopic}}
            - name: KAFKA_MODIFIED_LAR_GROUP
              value: {{.Values.kafka.modifiedLarGroup}}
            {{- if .Values.kafka.security }}
            - name: KAFKA_SECURITY
              value: {{.Values.kafka.security}}
            {{- end }}              
            - name: IS_GENERATE_MLAR_S3_FIES
              valueFrom:
                configMapKeyRef:
                  name: mlar-options-configmap
                  key: generateMlarS3File
            - name: IS_REGENERATE_MLAR
              valueFrom:
                configMapKeyRef:
                  name: mlar-options-configmap
                  key: regenerateMlarData
            - name: IS_CREATE_DISPOSITION_KAFKA_RECORD
              valueFrom:
                configMapKeyRef:
                  name: mlar-options-configmap
                  key: createDispositionKafkaRecord