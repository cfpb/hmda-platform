pekko {
  log-level = INFO
  http.server.preview.enable-http2 = on
  http.server.request-timeout=20800s

  PanelScheduler2018 = "pekko.quartz.schedules.PanelScheduler2018.expression = 0 30 00 * * ?"
  LarScheduler2018 = "pekko.quartz.schedules.LARScheduler2018.expression = 0 30 00 * * ?"
  TsScheduler2018 = "pekko.quartz.schedules.TsScheduler2018.expression = 0 30 00 * * ?"

  //2019 Publisher Schedules
  PanelScheduler2019 = "pekko.quartz.schedules.PanelScheduler2019.expression,0 30 00 * * ?"
  LarScheduler2019 = "pekko.quartz.schedules.LARScheduler2019.expression,0 30 00 * * ?"
  LarSchedulerLoanLimit2019 = "pekko.quartz.schedules.LARSchedulerLoanLimit2019.expression,0 30 00 * * ?"
  TsScheduler2019 = "pekko.quartz.schedules.TsScheduler2019.expression,0 30 00 * * ?"

  //2018 Public Dynamic Data Schedules
  PanelPublicScheduler2018 = "pekko.quartz.schedules.PanelPublicScheduler2018.expression = 0 30 00 * * ?"
  LarPublicScheduler2018 = "pekko.quartz.schedules.LarPublicScheduler2018.expression = 0 30 00 * * ?"
  TsPublicScheduler2018 = "pekko.quartz.schedules.TsPublicScheduler2018.expression = 0 30 00 * * ?"

  //2020 Public Dynamic Data Schedules
  LarSchedulerQuarterly2020 = "pekko.quartz.schedules.LarSchedulerQuarterly2020.expression,0 30 00 * * ?"
  TsSchedulerQuarterly2020 = "pekko.quartz.schedules.TsSchedulerQuarterly2020.expression,0 30 00 * * ?"
  LarSchedulerLoanLimit2020 = "pekko.quartz.schedules.LARSchedulerLoanLimit2020.expression,0 30 00 * * ?"

  // This is what is being used in tests
  quartz {
    schedules {
      LarPublicScheduler2018 {
        expression = "0 30 00 * * ?"
      }

      LarScheduler2018 {
        expression = "0 30 00 * * ?"
      }

      LarScheduler2019 {
        expression = "0 30 00 * * ?"
      }

      LarSchedulerLoanLimit2019 {
        expression = "0 30 00 * * ?"
      }
      LarSchedulerLoanLimit2020 {
        expression = "0 30 00 * * ?"
      }
      LarSchedulerQuarterly2020 {
        expression = "0 30 00 * * ?"
      }

      PanelScheduler2018 {
        expression = "0 30 00 * * ?"
      }

      PanelScheduler2019 {
        expression = "0 30 00 * * ?"
      }

      PanelScheduler2020 {
        expression = "0 30 00 * * ?"
      }

      TsPublicScheduler2018 {
        expression = "0 30 00 * * ?"
      }

      TsScheduler2018 {
        expression = "0 30 00 * * ?"
      }

      TsScheduler2019 {
        expression = "0 30 00 * * ?"
      }

      TsSchedulerQuarterly2020 {
        expression = "0 30 00 * * ?"
      }
    }
  }
}


hmda {
  regulator {
    http {
      createSchema = false
      createSchema = ${?REGULATOR_PG_CREATE_SCHEMA}
      timeout = 3
      host = "0.0.0.0"
      host = ${?HTTP_REGULATOR_HOST}
      port = "9099"
      port = ${?HTTP_REGULATOR_PORT}
      timeout = 10
    }
    grpc {
      host = "0.0.0.0"
      host = ${?GRPC_REGULATOR_HOST}
      port = 60082
      port = ${?GRPC_REGULATOR_PORT}
    }
  }
}

private-aws {
  private-access-key-id = "dev"
  private-secret-access-key = "dev"
  private-environment = "dev"
  private-s3-bucket = "cfpb-hmda-export"
  private-region = "us-east-1"
  private-year ="2018"
}

public-aws {
  public-access-key-id = "dev"
  public-secret-access-key = "dev"
  public-environment = "dev"
  public-s3-bucket = "cfpb-hmda-public"
  public-region = "us-east-1"
  public-year ="2018"
}

alppekko.s3 {
  endpoint-url = "http://localhost:9090"
  aws {
    credentials {
      provider = anon
    }
    region {
      provider = static
    }
  }
  path-style-access = true
}

filter {
  bank-filter-list=""
}

embedded-pg {
  profile = "slick.jdbc.PostgresProfile$"

  db {
    profile = slick.jdbc.PostgresProfile
    url = "jdbc:postgresql://localhost:5432/postgres?user=postgres&password=postgres"
    numThreads = 2
    queueSize = 100
    connectionTimeout = 20000
    validationTimeout = 10000
  }
}

// Since the code within the actors use the configuration from common's reference.conf, we need to override it
db = ${embedded-pg}